name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build static site artifact
        env:
          DROPBOX_APP_KEY: ${{ vars.DROPBOX_APP_KEY }}
        run: |
          mkdir -p _site/assets _site/demos
          cp -R assets demos _site/
          cp index.html _site/index.html
          cp 404.html _site/404.html
          printf 'window.RIVIERA_CONFIG = window.RIVIERA_CONFIG || {\n  dropboxAppKey: "%s",\n};\n' "${DROPBOX_APP_KEY}" > _site/assets/runtime-config.js
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
